ErrorResponse:
  type: object
  required: [status, detail]
  properties:
    status:
      type: integer
      example: 400
    detail:
      type: string
      example: エラーの詳細

User:
  type: object
  required: [id, name, avatar_url, created_at, updated_at]
  properties:
    id:
      type: integer
      format: int64
    name:
      type: string
    avatar_url:
      type: string
      format: uri
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time

ThumbnailUpload:
  type: object
  required: [id, url, created_at, updated_at]
  properties:
    id:
      type: integer
      format: int64
    url:
      type: string
      format: uri
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time

Work:
  type: object
  required: [id, title, description, visibility, owner, created_at, updated_at]
  properties:
    id:
      type: integer
      format: int64
    title:
      type: string
      maxLength: 200
    description:
      type: string
      maxLength: 4000
    visibility:
      type: string
      enum: [public, limited]
      description: "public: 誰でも閲覧可能 / limited: 同じDiscordサーバーのメンバーのみ閲覧可能"
    thumbnail_url:
      type: string
      format: uri
      nullable: true
    owner:
      $ref: "#/User"
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time

Tsumiki:
  type: object
  required: [id, title, visibility, user, created_at, updated_at]
  properties:
    id:
      type: integer
      format: int64
    title:
      type: string
      maxLength: 200
    thumbnail_url:
      type: string
      format: uri
      nullable: true
    visibility:
      type: string
      enum: [public, limited]
      description: "public: 誰でも閲覧可能 / limited: 同じDiscordサーバーのメンバーのみ閲覧可能"
    user:
      $ref: "#/User"
    work:
      allOf:
        - $ref: "#/Work"
      nullable: true
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time

TsumikiBlockMedia:
  type: object
  required: [id, type, url, created_at, updated_at]
  properties:
    id:
      type: integer
      format: int64
    type:
      type: string
      enum: [image, audio, video]
    url:
      type: string
      format: uri
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time

TsumikiBlock:
  type: object
  required: [id, medias, percentage, condition, created_at, updated_at]
  properties:
    id:
      type: integer
      format: int64
    message:
      type: string
      maxLength: 200
      nullable: true
    medias:
      type: array
      items:
        $ref: "#/TsumikiBlockMedia"
    percentage:
      type: integer
      minimum: 0
      maximum: 100
    condition:
      type: integer
      minimum: 1
      maximum: 5
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time

TsumikiBlockView:
  type: object
  required: [id, is_deleted]
  description: ブロック一覧取得用。削除済みブロックは is_deleted のみ返す
  properties:
    id:
      type: integer
      format: int64
    is_deleted:
      type: boolean
    message:
      type: string
      maxLength: 200
    medias:
      type: array
      items:
        $ref: "#/TsumikiBlockMedia"
    percentage:
      type: integer
      minimum: 0
      maximum: 100
    condition:
      type: integer
      minimum: 1
      maximum: 5
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
